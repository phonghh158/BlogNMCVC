<!doctype html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}"
>
<head>
    <title th:text="${pageTitle}">Read Topic</title>

    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/pages/topic/topic.css}" />
        <link rel="stylesheet" th:href="@{/css/pages/topic/comment.css}" />
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div
            class="topic-container"
            th:attr="data-topic-id=${topic.id},data-reaction-id=${reactionId},data-bookmark-id=${bookmarkId}"
    >
        <div class="topic-action" th:if="${isAdmin}">
            <a
                    th:href="@{/admin/topics/{id}/edit(id=${topic.id})}"
                    class="topic-action-button"
                    id="edit-topic"
            >
                <span class="material-symbols-rounded">edit</span>
            </a>

            <form
                    class="delete-topic-form"
                    th:action="@{/admin/topics/{id}/delete(id=${topic.id})}"
                    method="post"
                    onsubmit="return confirmDelete('Cậu chắc chắn muốn xóa bài viết này chứ?')"
            >
                <input
                        type="hidden"
                        th:name="${_csrf.parameterName}"
                        th:value="${_csrf.token}"
                />

                <button type="submit" class="topic-action-button">
                    <span class="material-symbols-rounded">delete_forever</span>
                </button>
            </form>
        </div>

        <img
                th:if="${topic.thumbnail != null and !#strings.isEmpty(topic.thumbnail)}"
                class="topic-thumbnail"
                th:src="@{${topic.thumbnail}}"
                th:alt="${topic.title}"
        />

        <div class="topic-header">
            <span class="topic-collection" th:text="${topic.collectionName}">Collection Name</span>
            <span class="topic-title" th:text="${topic.title}">Topic Title</span>

            <span class="topic-meta">
                By&nbsp;
                <a class="topic-author" href="#" th:text="${topic.authorName}">Author Name</a>
                &nbsp;on&nbsp;
                <span th:text="${publishedAt}">12 Th03, 2026</span>
            </span>
        </div>

        <div class="topic-content">
            <div class="main">
                <p th:each="paragraph : ${paragraphs}" th:text="${paragraph}">
                    Nội dung từng đoạn
                </p>
            </div>

            <p
                    class="footnote"
                    th:if="${topic.footnote != null and !#strings.isEmpty(topic.footnote)}"
                    th:text="${topic.footnote}"
            >
                Topic footnote
            </p>
        </div>

        <div class="topic-footer">
            <a
                    th:if="${topic.facebookLink != null and !#strings.isEmpty(topic.facebookLink)}"
                    th:href="${topic.facebookLink}"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="facebook-link"
            >
                Facebook Link
            </a>

            <div class="topic-footer-buttons" th:if="${isAuthenticated}">
                <div
                        class="like-button"
                        id="reaction-button"
                        th:classappend="${reactionId != null} ? ' active' : ''"
                        th:attr="data-topic-id=${topic.id},data-reaction-id=${reactionId}"
                >
                    <span class="material-symbols-rounded">favorite</span>
                </div>

                <div
                        class="pin-button"
                        id="bookmark-button"
                        th:classappend="${bookmarkId != null} ? ' active' : ''"
                        th:attr="data-topic-id=${topic.id},data-bookmark-id=${bookmarkId}"
                >
                    <span class="material-symbols-rounded">bookmark</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Comment -->
    <div class="comment-container"
         id="comment-container"
         th:attr="
            data-topic-id=${topic.id},
            data-is-authenticated=${isAuthenticated},
            data-is-admin=${isAdmin},
            data-current-user-id=${currentUser != null ? currentUser.id : ''},
            data-author-reactions=${authorReactions}"
    >
        <!-- FORM -->
        <div class="comment-form" th:if="${isAuthenticated}">
            <img
                    th:src="${currentUser != null and currentUser.avatar != null ? currentUser.avatar : '/images/default-avatar.jpg'}"
                    class="commenter-avatar"
            />

            <textarea
                    class="comment-input"
                    id="comment-input"
                    placeholder="Input your comment here..."
            ></textarea>

            <button type="button" class="comment-submit-btn" id="comment-submit-btn">
                <span class="material-symbols-rounded">send</span>
            </button>
        </div>

        <div class="comment-form" th:unless="${isAuthenticated}">
            <img src="/images/default-avatar.jpg" class="commenter-avatar"/>

            <span>
            Hãy
            <a th:href="@{/authentication}">Đăng nhập</a>
            và nói lên cảm nghĩ của mình nhé.
        </span>
        </div>

        <!-- LIST -->
        <div class="comment-list" id="comment-list"></div>

        <!-- NAV -->
        <div class="comment-nav">
            <div class="nav-btn" id="prev-page">
                <span class="material-symbols-rounded">arrow_back</span>
            </div>
            <div class="nav-btn" id="next-page">
                <span class="material-symbols-rounded">arrow_forward</span>
            </div>
        </div>
    </div>
</th:block>
<th:block layout:fragment="scripts">
    <script th:src="@{/js/pages/topic/topic.js}" defer></script>
    <script th:src="@{/js/pages/topic/comment.js}" defer></script>
</th:block>

</body>
</html>
