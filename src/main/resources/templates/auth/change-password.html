<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}"
>
<head>
    <title>Đổi mật khẩu</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/auth/change-password.css}" />
    </th:block>
</head>
<body>
<main layout:fragment="content">
    <div class="change-password-wrapper">
        <div class="change-password-header">
            <span class="material-symbols-rounded icon">key</span>
            <h1>Thiết lập mật khẩu mới</h1>
            <p>
                Vui lòng nhập mật khẩu mới của bạn bên dưới. Mật khẩu nên dài ít nhất
                8 ký tự.
            </p>
        </div>

        <form
                class="change-password-form"
                id="change-pwd-form"
                th:action="@{/auth/update-password}"
                th:object="${resetPasswordRequest}"
                method="post"
        >
            <input type="hidden" th:field="*{token}" />

            <div class="form-group">
                <label for="new-password">Mật khẩu mới</label>
                <input
                        type="password"
                        id="new-password"
                        th:field="*{newPassword}"
                        placeholder="Nhập mật khẩu mới..."
                        required
                        minlength="8"
                        maxlength="72"
                />
                <p
                        class="validation-msg"
                        th:if="${#fields.hasErrors('newPassword')}"
                        th:errors="*{newPassword}"
                ></p>
            </div>

            <div class="form-group">
                <label for="confirm-password">Nhập lại mật khẩu</label>
                <input
                        type="password"
                        id="confirm-password"
                        th:field="*{confirmNewPassword}"
                        placeholder="Xác nhận mật khẩu mới..."
                        required
                        minlength="8"
                        maxlength="72"
                />
                <p
                        class="validation-msg"
                        th:if="${#fields.hasErrors('confirmNewPassword')}"
                        th:errors="*{confirmNewPassword}"
                ></p>
            </div>

            <p
                    class="validation-msg"
                    th:if="${errorMessage != null}"
                    th:text="${errorMessage}"
            ></p>

            <div class="form-actions">
                <a th:href="@{/authentication}" class="btn btn-outline">Quay lại</a>
                <button type="submit" class="btn btn-primary">Xác nhận đổi</button>
            </div>
        </form>
    </div>
</main>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/auth/change-password.js}" defer></script>
</th:block>
</body>
</html>
