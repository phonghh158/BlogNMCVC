<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon/favicon.ico}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/explore.css}" />

    <th:block layout:fragment="styles"></th:block>

    <title th:text="${pageTitle != null ? pageTitle : 'Nhà, mây, cá và cây'}">Nhà, mây, cá và cây</title>
</head>
<body>
<div th:replace="~{shares/nav :: nav}"></div>
<div th:replace="~{shares/website-settings :: website-settings}"></div>

<div class="wrapper">
    <div
            th:replace="~{shares/header :: header(${pageTitle != null ? pageTitle : 'Trang chủ'})}"
    ></div>

    <main layout:fragment="content"></main>

    <div th:replace="~{shares/footer :: footer}"></div>
</div>

<div class="explore-overlay" id="explore-overlay">
    <button class="explore-close-btn" id="explore-close-btn" title="Đóng tìm kiếm">
        <span class="material-symbols-rounded">close</span>
    </button>

    <div class="explore-content">
        <h2>Khám phá nội dung bạn muốn:</h2>

        <form
                class="explore-form"
                id="explore-form"
                action="/search/topic"
                method="GET"
        >
            <div class="search-bar-wrapper">
                <input
                        type="text"
                        name="keyword"
                        class="explore-input"
                        placeholder="Nhập từ khóa tìm kiếm..."
                        autocomplete="off"
                        required
                />

                <select name="type" class="explore-select" id="explore-select">
                    <option value="title" selected>Tiêu đề</option>
                    <option value="user">Người dùng</option>
                </select>

                <button type="submit" class="explore-submit-btn">
                    <span class="material-symbols-rounded">search</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/index.js}" defer></script>
<script th:src="@{/js/explore.js}" defer></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
